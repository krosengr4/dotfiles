# start windows at 1 instead of 0
set -g base-index 1

# tmux pane splitting
bind-key -n F13 split-window -h
bind-key -n F14 split-window -v

# tmux window management
bind-key -n F10 new-window
bind-key -n F11 command-prompt -I "#W" { rename-window "%%" }
bind-key -n F12 confirm-before -p "kill-window #W? (y/n)" kill-window

# tmux window switching via Cmd+number (Ghostty sends F1-F9 sequences)
bind-key -n F1 select-window -t 1
bind-key -n F2 select-window -t 2
bind-key -n F3 select-window -t 3
bind-key -n F4 select-window -t 4
bind-key -n F5 select-window -t 5
bind-key -n F6 select-window -t 6
bind-key -n F7 select-window -t 7
bind-key -n F8 select-window -t 8
bind-key -n F9 select-window -t 9
