config-version = 2

start-at-login = true
after-startup-command = [
    'exec-and-forget /bin/bash /Users/kevinrosengren/.config/borders/bordersrc'
]
exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE && $HOME/.config/sketchybar/plugins/aerospace_space_windows.sh']

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 15
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse moves to newly focused monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

# Keep workspaces 1-9 alive even when empty
persistent-workspaces = ['1', '2', '3', '4', 'Q', 'W', 'E', 'R']

[workspace-to-monitor-force-assignment]
    1 = 1
    2 = 2
    3 = 3

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 10
    outer.left       = 5
    outer.bottom     = 5
    inner.vertical   = 10
    outer.top        = 39
    outer.right      = 5

[mode.main.binding]
    # Layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-f     = 'fullscreen'

    # Focus window
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'
    alt-z = 'focus --boundaries-action wrap-around-the-workspace dfs-next'
    alt-s = 'focus --boundaries-action wrap-around-the-workspace dfs-prev'

    # Move window within workspace (also crosses monitor edge)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Move window directly to another monitor
    alt-ctrl-left  = 'move-node-to-monitor --wrap-around prev'
    alt-ctrl-right = 'move-node-to-monitor --wrap-around next'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Switch workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-q = 'workspace Q'
    alt-w = 'workspace W'
    alt-e = 'workspace E'
    alt-r = 'workspace R'

    # Move focused window to workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-r = 'move-node-to-workspace R'

    # Workspace navigation
    alt-tab       = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'  # move whole workspace to next monitor

    # Service mode (reload config, reset layout, toggle float)
    alt-shift-semicolon = 'mode service'

    # Join mode (group windows into a container)
    alt-g = 'mode join'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace W', 'layout floating']

[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']  # reset layout
    f         = ['layout floating tiling', 'mode main']  # toggle float for focused window
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left',  'mode main']
    alt-shift-j = ['join-with down',  'mode main']
    alt-shift-k = ['join-with up',    'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[mode.join.binding]
    esc = 'mode main'
    h   = ['join-with left',  'mode main']
    j   = ['join-with down',  'mode main']
    k   = ['join-with up',    'mode main']
    l   = ['join-with right', 'mode main']
