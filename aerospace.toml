config-version = 2

start-at-login = true
after-startup-command = []

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse moves to newly focused monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

# Keep workspaces 1-9 alive even when empty
persistent-workspaces = ['1', '2', '3', '4', 'Q', 'W', 'E', 'R']

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical   = 0
    outer.left       = 0
    outer.bottom     = 0
    outer.top        = 0
    outer.right      = 0

[mode.main.binding]
    # Layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    cmd-f     = 'fullscreen'

    # Focus window
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move window within workspace (also crosses monitor edge)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Move window directly to another monitor
    alt-shift-left  = 'move-node-to-monitor --wrap-around prev'
    alt-shift-right = 'move-node-to-monitor --wrap-around next'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Switch workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-q = 'workspace Q'
    alt-w = 'workspace W'
    alt-e = 'workspace E'
    alt-r = 'workspace R'

    # Move focused window to workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-r = 'move-node-to-workspace R'

    # Workspace navigation
    alt-tab       = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'  # move whole workspace to next monitor

    # Service mode (reload config, reset layout, toggle float)
    alt-shift-semicolon = 'mode service'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'layout floating'

[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']  # reset layout
    f         = ['layout floating tiling', 'mode main']  # toggle float for focused window
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left',  'mode main']
    alt-shift-j = ['join-with down',  'mode main']
    alt-shift-k = ['join-with up',    'mode main']
    alt-shift-l = ['join-with right', 'mode main']
